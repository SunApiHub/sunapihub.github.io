<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>日核</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="loading">
  <div class="startup-loading-screen" aria-label="页面加载中" aria-hidden="true">
    <div class="startup-loading">
      <div class="startup-brand" aria-hidden="true">
        <img src="jpg/logo-color.png" alt="" class="startup-brand-logo">
        <div class="startup-brand-text">SunApiHub</div>
      </div>
      <div class="startup-loading-track">
        <span class="startup-loading-fill"></span>
      </div>
    </div>
    <div class="startup-loading-footer">2025-2026</div>
  </div>
  <div class="container">
    <aside id="sidebar"></aside>
    <main id="main-content"></main>
  </div>
  <div class="mobile-sidebar-backdrop" aria-hidden="true"></div>
  <nav class="mobile-tab-bar" aria-label="手机菜单">
    <button type="button" class="mobile-tab active" data-mobile-tab="home" aria-label="首页">
      <span class="mobile-tab-icon">⌂</span>
      <span class="mobile-tab-label">首页</span>
    </button>
    <button type="button" class="mobile-tab" data-mobile-tab="tags" aria-label="标签">
      <span class="mobile-tab-icon">#</span>
      <span class="mobile-tab-label">标签</span>
    </button>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/main1.js"></script>
</body>
</html>
