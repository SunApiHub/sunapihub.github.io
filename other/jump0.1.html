<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>像素跳跃大冒险</title>
<style>
  :root {
    --pixel-black:  #1a1a2e;
    --pixel-dark:   #16213e;
    --pixel-mid:    #0f3460;
    --pixel-accent: #e94560;
    --pixel-gold:   #f0c040;
    --pixel-green:  #4ecca3;
    --pixel-white:  #eeeeee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--pixel-black);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    width: 600px;
    padding: 0 8px;
  }

  .hud-item {
    color: var(--pixel-green);
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--pixel-black);
    image-rendering: pixelated;
  }

  .hud-item span {
    color: var(--pixel-gold);
  }

  canvas {
    border: 4px solid var(--pixel-mid);
    border-radius: 2px;
    box-shadow:
      0 0 0 4px var(--pixel-black),
      0 0 0 8px var(--pixel-mid),
      0 0 30px rgba(233, 69, 96, 0.3);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: pointer;
  }

  .message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--pixel-white);
    font-size: 14px;
    letter-spacing: 3px;
    text-align: center;
    pointer-events: none;
    text-shadow: 3px 3px 0 var(--pixel-black);
    animation: blink 1s steps(2, start) infinite;
  }

  .message.hidden { display: none; }

  @keyframes blink {
    0%   { opacity: 1; }
    50%  { opacity: 0; }
    100% { opacity: 1; }
  }

  .instructions {
    color: var(--pixel-white);
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.6;
    text-align: center;
  }

  .restart-btn {
    position: absolute;
    top: calc(50% + 40px);
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--pixel-accent);
    color: var(--pixel-white);
    border: 3px solid var(--pixel-white);
    padding: 8px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
    display: none;
    image-rendering: pixelated;
    text-shadow: 2px 2px 0 var(--pixel-black);
    box-shadow: 4px 4px 0 var(--pixel-black);
    transition: transform 0.05s;
    z-index: 10;
  }

  .restart-btn:hover {
    background: #ff6b81;
  }

  .restart-btn:active {
    transform: translate(-50%, -50%) translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--pixel-black);
  }

  .restart-btn.show { display: block; }

  @media (max-width: 640px) {
    .hud { width: 95vw; }
    canvas {
      width: 95vw;
      height: auto;
    }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="hud">
    <div class="hud-item">🏆 分数: <span id="scoreDisplay">0</span></div>
    <div class="hud-item">🔥 最高: <span id="highScoreDisplay">0</span></div>
    <div class="hud-item">💎 等级: <span id="levelDisplay">1</span></div>
  </div>
  <canvas id="gameCanvas" width="600" height="300"></canvas>
  <div class="message" id="message">按 空格键 或 点击 跳跃</div>
  <button class="restart-btn" id="restartBtn">🔄 再来一局</button>
  <div class="instructions">空格 / ↑ / 点击屏幕 跳跃 &nbsp;|&nbsp; 下蹲（↓）躲避飞鸟</div>
</div>

<script>
(function() {
  "use strict";

  // ─── Canvas & Context ────────────────────────────────
  const canvas    = document.getElementById('gameCanvas');
  const ctx       = canvas.getContext('2d');
  const W         = canvas.width;
  const H         = canvas.height;

  // Disable image smoothing for crisp pixels
  ctx.imageSmoothingEnabled = false;
  // We'll draw with a pixel-perfect approach

  // ─── DOM elements ──────────────────────────────────────
  const scoreDisplay     = document.getElementById('scoreDisplay');
  const highScoreDisplay = document.getElementById('highScoreDisplay');
  const levelDisplay     = document.getElementById('levelDisplay');
  const messageEl        = document.getElementById('message');
  const restartBtn       = document.getElementById('restartBtn');

  // ─── Pixel scaling ───────────────────────────────────
  const PX = 2; // every "logical pixel" = PX×PX real pixels

  // ─── Game constants (in logical pixels) ──────────────
  const GAME_W  = W / PX;           // 300
  const GAME_H  = H / PX;           // 150
  const GROUND_Y = GAME_H - 30;     // ground line (logical)
  const PLAYER_X = 40;              // player X (logical)

  // ─── Game state ───────────────────────────────────────
  let state       = 'waiting'; // 'waiting' | 'playing' | 'dead'
  let score       = 0;
  let highScore   = parseInt(localStorage.getItem('pixelJumpHighScore')) || 0;
  let speed       = 3;
  let level       = 1;
  let frameCount  = 0;
  let shakeTimer  = 0;

  // Update HUD
  function updateHUD() {
    scoreDisplay.textContent     = score;
    highScoreDisplay.textContent = highScore;
    levelDisplay.textContent     = level;
  }

  // ─── Player ────────────────────────────────────────────
  const player = {
    x: PLAYER_X,
    y: GROUND_Y - 22, // height 22 logical pixels
    w: 16,
    h: 22,
    vy: 0,
    jumping: false,
    ducking: false,
    normalH: 22,
    duckH: 14,
    animFrame: 0,
    animTimer: 0,
    eyeBlink: 0,
  };

  function resetPlayer() {
    player.y        = GROUND_Y - player.normalH;
    player.vy       = 0;
    player.jumping  = false;
    player.ducking  = false;
    player.h        = player.normalH;
    player.animFrame= 0;
    player.animTimer= 0;
    player.eyeBlink = 0;
  }

  const GRAVITY     = 0.55;
  const JUMP_STR    = 9.5;
  const FAST_FALL   = 0.95;

  // ─── Obstacles ─────────────────────────────────────────
  let obstacles = [];
  const OBSTACLE_TYPES = ['cactus_small', 'cactus_big', 'cactus_group', 'bird', 'rock'];

  function spawnObstacle() {
    const roll = Math.random();
    const isBird = roll < 0.18 && level >= 2;

    let type, w, h, yOffset;

    if (isBird) {
      type = 'bird';
      w = 16;
      h = 10;
      // Bird flies at varying heights
      const birdHeights = [GROUND_Y - 28, GROUND_Y - 38, GROUND_Y - 48];
      yOffset = birdHeights[Math.floor(Math.random() * birdHeights.length)];
    } else {
      const pick = Math.random();
      if (pick < 0.35) {
        type = 'cactus_small'; w = 8; h = 18;
      } else if (pick < 0.65) {
        type = 'cactus_big'; w = 12; h = 26;
      } else if (pick < 0.85) {
        type = 'cactus_group'; w = 20; h = 20;
      } else {
        type = 'rock'; w = 10; h = 10;
      }
      yOffset = GROUND_Y - h;
    }

    obstacles.push({
      type: type,
      x: GAME_W,
      y: yOffset,
      w: w,
      h: h,
      passed: false,
      wingFrame: 0,
      wingTimer: 0,
    });
  }

  // ─── Particles ──────────────────────────────────────────
  let particles = [];

  function spawnParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 3,
        vy: -(Math.random() * 4 + 2),
        life: 25 + Math.floor(Math.random() * 20),
        maxLife: 45,
        color: color,
        size: 1 + Math.floor(Math.random() * 2),
      });
    }
  }

  // ─── Stars / Background ─────────────────────────────────
  let stars = [];
  for (let i = 0; i < 40; i++) {
    stars.push({
      x: Math.random() * GAME_W,
      y: Math.random() * (GROUND_Y - 10),
      size: Math.random() < 0.3 ? 2 : 1,
      speed: 0.2 + Math.random() * 0.5,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.03 + Math.random() * 0.07,
    });
  }

  let bgBuildings = [];
  for (let i = 0; i < 6; i++) {
    bgBuildings.push({
      x: i * 55 + Math.random() * 20,
      w: 15 + Math.floor(Math.random() * 25),
      h: 20 + Math.floor(Math.random() * 40),
      windows: Math.floor(Math.random() * 4) + 1,
    });
  }

  // ─── Ground tiles ───────────────────────────────────────
  let groundOffset = 0;

  // ═══════════════════════════════════════════════════════
  // ██  PIXEL DRAWING FUNCTIONS (logical coord, scaled 2x)
  // ═══════════════════════════════════════════════════════

  function fillPixel(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * PX, y * PX, PX, PX);
  }

  function fillRectPx(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * PX, y * PX, w * PX, h * PX);
  }

  // Draw player - a cute pixel knight/adventurer
  function drawPlayer() {
    const p  = player;
    const px = Math.floor(p.x);
    const py = Math.floor(p.y);

    // Animation: running cycle (2 frames)
    if (state === 'playing' && !p.jumping) {
      p.animTimer++;
      if (p.animTimer > 6) { p.animTimer = 0; p.animFrame = 1 - p.animFrame; }
    }

    const f = p.animFrame;

    // Eye blink
    p.eyeBlink++;
    const blinkPhase = (p.eyeBlink % 80);
    const eyeOpen = blinkPhase < 75; // blink for 5 frames

    if (p.ducking) {
      drawDuckingPlayer(px, py);
      return;
    }

    // === STANDING / RUNNING / JUMPING ===

    const COLORS = {
      body:   '#3a6fcf', // blue armor
      bodyD:  '#2a5298',
      skin:   '#f5cba7',
      skinD:  '#e0ac69',
      hair:   '#5c3317',
      hairD:  '#3e2008',
      eye:    '#1a1a2e',
      boots:  '#5c3317',
      belt:   '#8b4513',
      buckle: '#f0c040',
      sword:  '#c0c0c0',
      swordG: '#f0c040',
      cape:  '#c0392b',
      capeD: '#922b21',
    };

    // --- Cape (behind body) ---
    if (!p.ducking) {
      const capeX = p.jumping ? px - 3 : px - 2 + (f === 0 ? 0 : 1);
      for (let row = 0; row < 10; row++) {
        for (let col = 0; col < 4; col++) {
          if (row < 2 && col === 0) continue;
          if (row >= 8 && col === 3) continue;
          fillPixel(capeX + col, py + 3 + row, col < 2 ? COLORS.cape : COLORS.capeD);
        }
      }
    }

    // --- Boots ---
    fillRectPx(px + 2, py + 18, 5, 4, COLORS.boots);
    fillRectPx(px + 8, py + 18, 6, 4, COLORS.boots);
    if (!p.jumping) {
      fillPixel(px + 1, py + 18, COLORS.boots);
      fillPixel(px + 13, py + 18, COLORS.boots);
      if (f === 1) {
        // slight leg shift
        fillPixel(px + 7, py + 19, COLORS.boots);
        fillPixel(px + 12, py + 17, COLORS.boots);
      }
    }

    // --- Legs ---
    fillRectPx(px + 3, py + 14, 3, 5, COLORS.bodyD);
    fillRectPx(px + 9, py + 14, 3, 5, COLORS.bodyD);
    if (p.jumping) {
      fillPixel(px + 6, py + 15, COLORS.body);
    }
    if (f === 0 && !p.jumping) {
      fillRectPx(px + 6, py + 16, 2, 2, COLORS.bodyD);
    }

    // --- Belt ---
    fillRectPx(px + 2, py + 12, 11, 2, COLORS.belt);
    fillPixel(px + 7, py + 11, COLORS.buckle);
    fillRectPx(px + 6, py + 12, 3, 2, COLORS.buckle);

    // --- Body / Torso ---
    fillRectPx(px + 3, py + 5, 9, 8, COLORS.body);
    // armor detail (vertical line)
    fillRectPx(px + 6, py + 5, 2, 8, COLORS.bodyD);
    // shoulders
    fillRectPx(px + 1, py + 5, 2, 3, COLORS.bodyD);
    fillRectPx(px + 13, py + 5, 2, 3, COLORS.bodyD);
    // chest plate highlight
    fillPixel(px + 5, py + 6, '#5b9bd5');
    fillPixel(px + 9, py + 6, '#5b9bd5');

    // --- Arms ---
    // Left arm
    fillRectPx(px + 1, py + 8, 2, 5, COLORS.bodyD);
    if (p.jumping) {
      fillRectPx(px - 1, py + 6, 2, 5, COLORS.bodyD); // raised
      // Sword in raised hand
      fillRectPx(px - 2, py + 1, 2, 6, COLORS.sword);
      fillPixel(px - 1, py, COLORS.swordG);
    } else {
      fillRectPx(px + 1, py + 8, 2, 5, COLORS.bodyD);
      // Sword at side
      if (f === 0) {
        fillRectPx(px, py + 12, 1, 5, COLORS.sword);
        fillPixel(px, py + 11, COLORS.swordG);
      }
    }
    // Right arm
    fillRectPx(px + 12, py + 8, 2, 5, COLORS.bodyD);
    if (p.jumping) {
      fillRectPx(px + 13, py + 4, 2, 5, COLORS.bodyD); // raised
    }

    // --- Skin (hands) ---
    if (p.jumping) {
      fillPixel(px - 1, py + 4, COLORS.skin);
      fillPixel(px + 13, py + 3, COLORS.skin);
    } else {
      fillPixel(px + 1, py + 7, COLORS.skin);
      fillPixel(px + 12, py + 7, COLORS.skin);
    }

    // --- Head ---
    fillRectPx(px + 3, py, 10, 6, COLORS.skin);

    // --- Hair ---
    fillRectPx(px + 2, py - 2, 12, 3, COLORS.hair);
    fillPixel(px + 1, py - 1, COLORS.hair);
    fillPixel(px + 14, py - 1, COLORS.hair);
    fillPixel(px + 3, py - 3, COLORS.hair);
    fillPixel(px + 12, py - 3, COLORS.hair);
    // Hair detail
    fillPixel(px + 5, py - 1, COLORS.hairD);
    fillPixel(px + 10, py - 1, COLORS.hairD);

    // --- Eyes ---
    if (eyeOpen) {
      fillPixel(px + 6, py + 1, COLORS.eye);
      fillPixel(px + 10, py + 1, COLORS.eye);
      // eye highlight
      fillPixel(px + 7, py + 1, COLORS.buckle);
      fillPixel(px + 11, py + 1, COLORS.buckle);
    } else {
      fillPixel(px + 6, py + 1, COLORS.eye);
      fillPixel(px + 10, py + 1, COLORS.eye);
    }

    // --- Mouth ---
    fillPixel(px + 8, py + 4, '#8b4513');

    // --- Ears / side hair ---
    fillPixel(px + 2, py + 1, COLORS.hair);
    fillPixel(px + 13, py + 1, COLORS.hair);
  }

  function drawDuckingPlayer(px, py) {
    const dh = player.duckH; // 14
    const by = py + 8; // shift sprite down to ground

    // Ducking version - wider, shorter
    fillRectPx(px + 1, by + 1, 14, 5, '#3a6fcf'); // body
    fillRectPx(px + 2, by, 12, 3, '#f5cba7');    // head
    fillRectPx(px + 1, by - 1, 14, 2, '#5c3317'); // hair
    // Eyes
    fillPixel(px + 5, by + 1, '#1a1a2e');
    fillPixel(px + 10, by + 1, '#1a1a2e');
    fillPixel(px + 6, by + 1, '#f0c040');
    fillPixel(px + 11, by + 1, '#f0c040');
    // Mouth (worried when ducking)
    fillPixel(px + 8, by + 3, '#8b4513');
    // Feet
    fillRectPx(px, by + 6, 5, 3, '#5c3317');
    fillRectPx(px + 11, by + 6, 5, 3, '#5c3317');
    // Shield in front
    fillRectPx(px + 14, by + 1, 3, 5, '#c0c0c0');
    fillPixel(px + 15, by + 3, '#f0c040');
  }

  // ─── Draw obstacles with pixel art ────────────────────
  function drawObstacle(obs) {
    const ox = Math.floor(obs.x);
    const oy = Math.floor(obs.y);

    switch (obs.type) {
      case 'cactus_small':
        drawCactusSmall(ox, oy);
        break;
      case 'cactus_big':
        drawCactusBig(ox, oy);
        break;
      case 'cactus_group':
        drawCactusGroup(ox, oy);
        break;
      case 'bird':
        drawBird(ox, oy, obs);
        break;
      case 'rock':
        drawRock(ox, oy);
        break;
    }
  }

  function drawCactusSmall(x, y) {
    // Main stem
    fillRectPx(x + 2, y + 2, 4, 16, '#2e7d32');
    fillPixel(x + 3, y + 2, '#4caf50');
    // Left arm
    fillRectPx(x, y + 6, 2, 3, '#2e7d32');
    fillRectPx(x, y + 5, 2, 2, '#2e7d32');
    fillPixel(x + 1, y + 5, '#4caf50');
    // Right arm
    fillRectPx(x + 6, y + 9, 2, 3, '#2e7d32');
    fillRectPx(x + 5, y + 8, 3, 2, '#2e7d32');
    fillPixel(x + 5, y + 8, '#4caf50');
    // Thorns
    fillPixel(x + 4, y + 4, '#81c784');
    fillPixel(x + 3, y + 10, '#81c784');
  }

  function drawCactusBig(x, y) {
    // Main stem
    fillRectPx(x + 4, y + 2, 5, 24, '#2e7d32');
    fillRectPx(x + 5, y + 2, 2, 24, '#388e3c');
    // Left branch
    fillRectPx(x, y + 8, 4, 3, '#2e7d32');
    fillRectPx(x + 1, y + 4, 3, 5, '#2e7d32');
    fillPixel(x + 2, y + 4, '#4caf50');
    // Right branch
    fillRectPx(x + 9, y + 12, 3, 3, '#2e7d32');
    fillRectPx(x + 8, y + 7, 4, 6, '#2e7d32');
    fillPixel(x + 9, y + 7, '#4caf50');
    // Spikes
    fillPixel(x + 5, y + 6, '#81c784');
    fillPixel(x + 6, y + 12, '#81c784');
    fillPixel(x + 4, y + 18, '#81c784');
  }

  function drawCactusGroup(x, y) {
    drawCactusSmall(x, y + 2);
    drawCactusSmall(x + 6, y);
    drawCactusSmall(x + 12, y + 4);
  }

  function drawBird(x, y, obs) {
    // Bird with flapping wings
    obs.wingTimer++;
    if (obs.wingTimer > 12) { obs.wingTimer = 0; obs.wingFrame = 1 - obs.wingFrame; }
    const wf = obs.wingFrame;

    // Body
    fillRectPx(x + 6, y + 2, 5, 4, '#e74c3c');
    fillPixel(x + 7, y + 2, '#c0392b');
    // Head
    fillRectPx(x + 3, y, 5, 4, '#e74c3c');
    fillPixel(x + 4, y + 1, '#ecf0f1'); // eye white
    fillPixel(x + 4, y + 1, '#2c3e50'); // pupil
    // Beak
    fillPixel(x + 1, y + 2, '#f39c12');
    fillPixel(x, y + 2, '#e67e22');
    // Wings
    if (wf === 0) {
      fillRectPx(x + 5, y - 3, 6, 2, '#c0392b');
      fillRectPx(x + 6, y - 2, 5, 2, '#e74c3c');
      fillPixel(x + 11, y - 2, '#c0392b');
    } else {
      fillRectPx(x + 5, y + 5, 6, 2, '#c0392b');
      fillRectPx(x + 6, y + 4, 5, 2, '#e74c3c');
    }
    // Tail
    fillRectPx(x + 12, y + 3, 3, 2, '#c0392b');
    fillPixel(x + 14, y + 2, '#e74c3c');
  }

  function drawRock(x, y) {
    fillRectPx(x + 1, y + 3, 8, 7, '#7f8c8d');
    fillRectPx(x + 2, y + 2, 6, 8, '#95a5a6');
    fillPixel(x + 3, y + 1, '#bdc3c7');
    fillPixel(x + 7, y + 2, '#7f8c8d');
    fillPixel(x + 4, y + 5, '#7f8c8d'); // detail
    fillPixel(x + 6, y + 6, '#bdc3c7'); // highlight
  }

  // ─── Draw ground ──────────────────────────────────────
  function drawGround() {
    // Ground fill
    fillRectPx(0, GROUND_Y, GAME_W, GAME_H - GROUND_Y, '#4a3728');

    // Surface line
    for (let x = 0; x < GAME_W; x++) {
      fillPixel(x, GROUND_Y, '#6b4f3a');
    }

    // Grass tufts on surface
    const grassOffset = Math.floor(groundOffset) % 20;
    for (let x = -grassOffset; x < GAME_W + 10; x += 10) {
      fillPixel(x,     GROUND_Y - 1, '#3e7a2e');
      fillPixel(x + 1, GROUND_Y - 1, '#4caf50');
      if (x % 20 === 0) {
        fillPixel(x + 2, GROUND_Y - 2, '#4caf50');
        fillPixel(x + 1, GROUND_Y - 2, '#388e3c');
      }
    }

    // Ground texture (dirt spots)
    const seed = 42;
    for (let x = 0; x < GAME_W; x += 4) {
      const r = ((x * seed) % 7);
      if (r < 2) {
        fillPixel(x, GROUND_Y + 3 + (r * 3), '#3d2b1f');
      }
    }
  }

  // ─── Draw stars ────────────────────────────────────────
  function drawStars() {
    for (const s of stars) {
      s.twinkle += s.twinkleSpeed;
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle));
      const color = alpha > 0.7 ? '#f0c040' : '#95a5a6';
      fillPixel(Math.floor(s.x), Math.floor(s.y), color);
      if (s.size > 1) {
        fillPixel(Math.floor(s.x) - 1, Math.floor(s.y), color);
        fillPixel(Math.floor(s.x), Math.floor(s.y) - 1, color);
      }
    }
  }

  // ─── Draw buildings ────────────────────────────────────
  function drawBuildings() {
    for (const b of bgBuildings) {
      const bx = Math.floor(b.x);
      const by = GROUND_Y - 1;
      // Building body (dark silhouette)
      fillRectPx(bx, by - b.h, b.w, b.h, '#1a1a3e');
      fillRectPx(bx, by - b.h - 1, b.w, 2, '#0f3460');
      // Windows (warm glow)
      for (let wy = by - b.h + 3; wy < by - 2; wy += 6) {
        for (let wx = bx + 2; wx < bx + b.w - 2; wx += 4) {
          const lit = Math.random() > 0.3;
          fillPixel(wx, wy, lit ? '#f0c040' : '#2a2a4e');
          fillPixel(wx + 1, wy, lit ? '#e94560' : '#2a2a4e');
        }
      }
    }
  }

  // ─── Draw particles ────────────────────────────────────
  function drawParticles() {
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      const color = p.color;
      fillPixel(Math.floor(p.x), Math.floor(p.y), color);
      if (p.size > 1) {
        fillPixel(Math.floor(p.x) + 1, Math.floor(p.y), color);
        fillPixel(Math.floor(p.x), Math.floor(p.y) + 1, color);
      }
    }
  }

  // ─── Draw death effect ──────────────────────────────────
  function drawDeathSkull(x, y) {
    // Simple skull for game over position
    fillRectPx(x + 1, y, 6, 7, '#ecf0f1');
    fillRectPx(x + 2, y + 1, 4, 5, '#bdc3c7');
    // Eyes
    fillPixel(x + 2, y + 2, '#1a1a2e');
    fillPixel(x + 5, y + 2, '#1a1a2e');
    fillPixel(x + 3, y + 3, '#e74c3c');
    fillPixel(x + 4, y + 3, '#e74c3c');
    // Teeth
    fillPixel(x + 2, y + 5, '#ecf0f1');
    fillPixel(x + 3, y + 5, '#1a1a2e');
    fillPixel(x + 4, y + 5, '#1a1a2e');
    fillPixel(x + 5, y + 5, '#ecf0f1');
  }

  // ═══════════════════════════════════════════════════════
  // ██  GAME LOGIC
  // ═══════════════════════════════════════════════════════

  function jump() {
    if (state === 'waiting') {
      state = 'playing';
      messageEl.classList.add('hidden');
      restartBtn.classList.remove('show');
      resetPlayer();
    }
    if (state === 'playing' && !player.jumping) {
      player.vy = -JUMP_STR;
      player.jumping = true;
    }
  }

  function duck(active) {
    if (state !== 'playing') return;
    if (active) {
      player.ducking = true;
      player.h = player.duckH;
      player.y = GROUND_Y - player.duckH;
    } else {
      player.ducking = false;
      player.h = player.normalH;
      player.y = GROUND_Y - player.normalH;
    }
  }

  function restart() {
    obstacles = [];
    particles = [];
    score = 0;
    speed = 3;
    level = 1;
    frameCount = 0;
    groundOffset = 0;
    player.ducking = false;
    resetPlayer();
    if (state === 'dead') {
      state = 'waiting';
      messageEl.classList.remove('hidden');
      restartBtn.classList.remove('show');
    }
    updateHUD();
  }

  function die() {
    state = 'dead';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('pixelJumpHighScore', highScore);
    }
    spawnParticles(player.x + 8, player.y + 10, 30, '#e94560');
    spawnParticles(player.x + 8, player.y + 10, 15, '#f0c040');
    shakeTimer = 20;
    restartBtn.classList.add('show');
    updateHUD();
  }

  // ─── Collision check (pixel-perfect AABB ──────────────
  function checkCollision() {
    // Player hitbox (slightly forgiving)
    const px = player.x + 2;
    const py = player.y + 1;
    const pw = player.w - 4;
    const ph = player.h - 2;

    for (const obs of obstacles) {
      // Obstacle hitbox (also slightly forgiving)
      const ox = obs.x + 1;
      const oy = obs.y + 1;
      const ow = obs.w - 2;
      const oh = obs.h - 2;

      if (
        px < ox + ow &&
        px + pw > ox &&
        py < oy + oh &&
        py + ph > oy
      ) {
        return true;
      }
    }
    return false;
  }

  // ─── Main update ──────────────────────────────────────
  function update() {
    if (state !== 'playing') {
      // Still animate particles and screen shake
      updateParticles();
      if (shakeTimer > 0) shakeTimer--;
      return;
    }

    frameCount++;

    // ─── Speed & Level progression ────────────────────
    speed = 3 + Math.floor(frameCount / 300) * 0.5;
    level = 1 + Math.floor(frameCount / 600);
    if (speed > 10) speed = 10;

    // ─── Ground scroll ────────────────────────────────
    groundOffset += speed;

    // ─── Background scroll ────────────────────────────
    for (const b of bgBuildings) {
      b.x -= speed * 0.3;
      if (b.x + b.w < 0) {
        b.x = GAME_W + Math.random() * 30;
        b.w = 15 + Math.floor(Math.random() * 25);
        b.h = 20 + Math.floor(Math.random() * 40);
      }
    }

    // ─── Stars move ───────────────────────────────────
    for (const s of stars) {
      s.x -= s.speed;
      if (s.x < 0) {
        s.x = GAME_W;
        s.y = Math.random() * (GROUND_Y - 10);
      }
    }

    // ─── Player physics ───────────────────────────────
    if (player.jumping) {
      player.vy += GRAVITY;
      // Fast fall when holding down
      if (player.ducking && player.vy > 0) {
        player.vy += FAST_FALL;
      }
      player.y += player.vy;

      if (player.y >= GROUND_Y - player.h) {
        player.y = GROUND_Y - player.h;
        player.vy = 0;
        player.jumping = false;
        spawnParticles(player.x + 4, GROUND_Y - 2, 4, '#8b7355');
      }
    }

    // ─── Spawn obstacles ──────────────────────────────
    const minGap = Math.max(35, 70 - speed * 3);
    const lastObs = obstacles[obstacles.length - 1];
    if (!lastObs || lastObs.x < GAME_W - minGap) {
      const shouldSpawn = !lastObs || lastObs.x < GAME_W - minGap - Math.random() * 40;
      if (shouldSpawn || !lastObs) {
        spawnObstacle();
      }
    }

    // ─── Update obstacles ─────────────────────────────
    for (const obs of obstacles) {
      obs.x -= speed;
    }

    // ─── Remove off-screen obstacles ──────────────────
    obstacles = obstacles.filter(obs => obs.x > -30);

    // ─── Score (for passed obstacles) ─────────────────
    for (const obs of obstacles) {
      if (!obs.passed && obs.x + obs.w < player.x) {
        obs.passed = true;
        score += obs.type === 'bird' ? 20 : 10;
        // Particle reward
        spawnParticles(player.x + 8, GROUND_Y - 5, 5, '#4caf50');
      }
    }

    // ─── Collision ────────────────────────────────────
    if (checkCollision()) {
      die();
    }

    // ─── Particles ────────────────────────────────────
    updateParticles();

    // ─── Shake timer ──────────────────────────────────
    if (shakeTimer > 0) shakeTimer--;

    updateHUD();
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  // ═══════════════════════════════════════════════════════
  // ██  RENDER
  // ═══════════════════════════════════════════════════════

  function draw() {
    // Clear
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Screen shake offset for death
    let shakeX = 0, shakeY = 0;
    if (state === 'dead' && shakeTimer > 0) {
      shakeX = (Math.random() - 0.5) * 4;
      shakeY = (Math.random() - 0.5) * 4;
    }

    ctx.save();
    ctx.translate(shakeX * PX, shakeY * PX);

    // Background gradient (sky)
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y * PX);
    skyGrad.addColorStop(0, '#0a0a23');
    skyGrad.addColorStop(0.6, '#1a1a4e');
    skyGrad.addColorStop(1, '#2a1a4e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, GROUND_Y * PX);

    // Stars
    drawStars();

    // Moon
    fillPixel(250, 20, '#ecf0f1');
    fillPixel(251, 19, '#ecf0f1');
    fillPixel(252, 20, '#ecf0f1');
    fillPixel(249, 20, '#ecf0f1');
    fillPixel(251, 20, '#f5cba7');
    fillPixel(250, 19, '#f5cba7');
    fillPixel(252, 19, '#f5cba7');
    fillPixel(253, 18, '#1a1a4e'); // crater shadow
    fillPixel(248, 21, '#1a1a4e');

    // Buildings (parallax)
    drawBuildings();

    // Ground
    drawGround();

    // Obstacles
    for (const obs of obstacles) {
      drawObstacle(obs);
    }

    // Player
    drawPlayer();

    // Particles
    drawParticles();

    // Death skull at player position
    if (state === 'dead') {
      drawDeathSkull(player.x, player.y + 5);
    }

    ctx.restore();

    // Vignette overlay when dead
    if (state === 'dead') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(0, 0, W, H);

      // Game Over text (pixel style)
      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 28px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束!', W/2, H/2 - 30);
      ctx.fillStyle = '#f0c040';
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText(`得分: ${score}`, W/2, H/2 + 5);
    }
  }

  // ═══════════════════════════════════════════════════════
  // ██  GAME LOOP
  // ═══════════════════════════════════════════════════════

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // ═══════════════════════════════════════════════════════
  // ██  INPUT HANDLERS
  // ═══════════════════════════════════════════════════════

  function handleKeyDown(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (state === 'dead') {
        restart();
      } else {
        jump();
      }
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      if (state === 'playing') duck(true);
    }
  }

  function handleKeyUp(e) {
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      if (state === 'playing') duck(false);
    }
  }

  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    if (state === 'dead') {
      restart();
    } else {
      jump();
    }
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (state === 'dead') {
      restart();
    } else {
      jump();
    }
  });

  restartBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    restart();
  });

  document.addEventListener('keydown', handleKeyDown);
  document.addEventListener('keyup', handleKeyUp);

  // ─── Init ────────────────────────────────────────────
  updateHUD();
  highScoreDisplay.textContent = highScore;
  gameLoop();
})();
</script>
</body>
